app = "quarry"
primary_region = "iad"

[build]

[env]
  QUARRY_ROOT = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "quarry_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
